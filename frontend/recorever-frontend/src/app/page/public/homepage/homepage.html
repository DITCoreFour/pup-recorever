<div class="hero">
  <div class="bg">
    <div class="bg2"></div>
    <div class="bg3"></div>
    <img class="dots" src="assets/dots0.svg" />
    <div class="oval"></div>
    <div class="oval-copy"></div>
    <div class="oval-copy-2"></div>
  </div>
  <img class="wave" src="assets/wave0.svg" />
  <div class="content">
    <div class="top">
      <div class="manage-your-remote-t">PUP Recover</div>
      <div class="with-lots-of-unique">
        Welcome here, the centralized, real-time web platform designed to help
        our campus community securely report, track, and recover misplaced
        belongings.
        <br />
      </div>
     
      <div class="browse-items-here">Browse Items here</div>

      <app-report-button
        theme="lost"
        label="Lost Item"
        (buttonClicked)="navigateToLost()" />

      <app-report-button
        theme="found"
        label="Found Item"
        (buttonClicked)="navigateToFound()" />
    </div>
  </div>
</div>
