<div class="page-container">
  <div class="page-header">
    <img src="assets/profile-avatar.png" alt="Profile" class="header-icon"/>
    <h1 class="page-title">Profile</h1>
  </div>

  <div class="profile-layout">
    
    <div class="left-section">
      <div class="avatar-wrapper">
        <img 
            [src]="getProfileImageUrl(currentUser()?.profile_picture)" 
            alt="User Avatar" 
            class="avatar-img"/>
        
        <input 
            type="file" 
            #fileInput 
            accept="image/*" 
            class="hidden-file-input"
            (change)="onFileSelected($event)" />
            
        <button 
            type="button" 
            class="edit-avatar-btn" 
            title="Change Avatar"
            (click)="fileInput.click()">
          ✎
        </button>
      </div>
      <h2 class="user-fullname">
        {{ currentUser()?.first_name }} {{ currentUser()?.last_name }}
      </h2>
      <p class="user-email">{{ currentUser()?.email }}</p>
    </div>

    <div class="right-section">
      <form [formGroup]="profileForm" (ngSubmit)="onSaveChanges()">
        
        <div class="form-row">
          <div class="input-group">
            <label>First Name<span class="asterisk">*</span></label>
            <input type="text" formControlName="firstName" />
          </div>
          <div class="input-group">
            <label>Last Name<span class="asterisk">*</span></label>
            <input type="text" formControlName="lastName" />
          </div>
        </div>

        <div class="input-group">
          <label>Email<span class="asterisk">*</span></label>
          <input type="email" formControlName="email" />
        </div>

        <div class="form-row">
          <div class="input-group disabled-group">
            <label>
              Program
            </label>
            <input 
                type="text" 
                [value]="getProgramCode(currentUser()?.program_id)" 
                disabled />
          </div>
          <div class="input-group disabled-group">
            <label>
              Year
            </label>
            <input 
                type="text" 
                [value]="currentUser()?.year_level || 'N/A'" 
                disabled />
          </div>
        </div>

        <p class="helper-text">
          If you need to update your 
          program or year, please contact the admin.
        </p>

        @if (updateMessage) {
          <div class="status-message">
            {{ updateMessage }}
          </div>
        }

        <div class="action-row">
          <button 
              type="submit" 
              class="save-btn" 
              [disabled]="profileForm.invalid || isSubmitting">
            @if (isSubmitting) {
              SAVING...
            } @else {
              SAVE CHANGES
            }
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
