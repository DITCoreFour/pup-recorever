<div class="page-container">
  <header class="breadcrumb-header">
    <img src="assets/claim-status.png" alt="Found Items" class="header-icon" />
    <h2 class="breadcrumb-text">
      <span class="main-path">Found Status Management</span>
    </h2>
  </header>

  <div class="action-bar">
    <div class="search-wrapper">
      <app-search-bar (search)="onSearch($event)"></app-search-bar>
    </div>
  </div>

  <div class="filter-wrapper">
    <app-filter
      [locations]="locations()"
      [itemType]="'found'"
      [isAdminPage]="true"
      [adminStatusOptions]="statusFilters"
      [initialAdminStatus]="currentStatusFilter()"
      (filterChange)="onFilterChange($event)">
    </app-filter>
  </div>

  <div class="reports-content">
    @if (reports().length > 0) {
      <app-report-item-grid
            [items]="filteredReports()"
            [isAdmin]="isAdmin()"
            [highlightId]="highlightId()"
            (cardClicked)="onViewDetails($event.report_id)">
      </app-report-item-grid>
    }

    <div #scrollAnchor class="scroll-anchor">
      @if (isLoading()) {
        <div class="content-message">
          <div class="spinner"></div>
          <span>Loading more reports...</span>
        </div>
      } @else if (reports().length === 0) {
        <div class="content-message">No reports found.</div>
      } @else if (currentPage() >= totalPages()) {
        <div class="end-of-list">No more reports to display.</div>
      }
    </div>
  </div>

  @if (selectedReport()) {
    <app-claim-form-modal
        [claimData]="selectedReport()!"
        (close)="onCloseModal()"
        (statusChange)="onStatusChanged($event)">
    </app-claim-form-modal>
  }
</div>
