<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-box" role="dialog" aria-modal="true">

    <button mat-icon-button class="close-btn" (click)="onClose()"
      aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>

    <h2 class="modal-title">
      @if (isEditMode()) {
        Edit Category
      } @else {
        Add New Category
      }
    </h2>

    <form [formGroup]="categoryForm" class="modal-form">
      <div class="form-group">
        <label class="form-label" for="categoryName">Category Name</label>
        <input
          id="categoryName"
          class="form-input"
          type="text"
          formControlName="name"
          placeholder="e.g., Electronics, Documents, Tumblers...."
          (keyup.enter)="onSave()" />
        @if (nameControl.invalid && nameControl.touched) {
          <span class="error-text">Category name cannot be empty.</span>
        }
      </div>

      <button class="save-btn" type="button" (click)="onSave()">SAVE</button>
    </form>

  </div>
</div>
