<div class="verification-wrapper">
  <div class="header-section">
    <h2 class="title">Security Verification</h2>
    <p class="subtitle">
      We sent a 5-digit code to <br>
      <span class="user-email">{{ email }}</span>
    </p>
  </div>

  <div class="otp-container">
    @for (digit of digits; track $index) {
      <input 
        [id]="'otp-' + $index"
        type="text" 
        class="otp-input" 
        maxLength="1"
        [value]="digits[$index]"
        (input)="onInput($event, $index)"
        (keydown)="onKeyDown($event, $index)"
        inputmode="numeric"
        placeholder="0">
    }
  </div>

  <div class="action-section">
    <div class="timer-box">
      @if (timeLeft() > 0) {
        <p class="timer-text">Resend available in <span>{{ timeLeft() }}s</span></p>
      } @else {
        <button type="button" class="resend-btn" (click)="resendCode()">
          Resend New Code
        </button>
      }
    </div>

    <button 
      type="button"
      class="confirm-btn" 
      [disabled]="digits.join('').length < 5"
      (click)="confirm()">
      Verify Account
    </button>

    <button type="button" class="back-btn" (click)="close.emit()">
      Change Email Address
    </button>
  </div>
</div>
